<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>tailwind-basic</title>
        <link href="/src/style.css" rel="stylesheet">  
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    </head>
    <body class="mx-auto px-8 sm:px-6 lg:px-8 bg-[url(/public/img/background.jpg)] dark:bg-[url(/public/img/azazal.jpg)] font-sans">

        <div class="relative z-1 overflow-hidden">

            <!-- Header -->

            <header class="mt-2 flex justify-between">
                <div class="w-[20%]">
                    <img class="w-full" src="public/img/azazal.jpg" alt="logo_placeholder">
                </div>

                <div class="w-[20%]">
                    <img class="w-full" id="dark_mode" src="public/img/azazal.jpg" alt="logo_placeholder">
                </div>
            </header>

            <!-- Section titre -->

            <section class="section-space relative max-w-5xl m-auto">
                <div class="relative w-fit">
                    <img class="absolute z-2 w-[20%] -top-[10%] rotate-15 left-[45%]" src="/public/img/star.png">
                    <img class="absolute z-2 w-[20%] top-[33%] -rotate-25 left-[6%]" src="/public/img/star.png">
                    <img class="absolute z-2 w-[20%] -bottom-[2%] rotate-40 right-[11%]" src="/public/img/star.png">
                    <h1 class="font-decoration text-[clamp(11rem,25vw,18rem)] relative z-1 w-fit h-auto">SPACE CATS</h1>
                </div>
            </section>


            <!-- Section UFO -->

            <section class="section-space">

            </section>

            <!-- Section Cats-->
            
            <section class="section-space">
                <h2 class="font-decoration text-[clamp(3rem,3vw,3.4rem)] w-full text-center mb-11">Discover our cats</h2>
                <div class="grid grid-cols-3 grid-rows-3 gap-7">
                    <div class="col-start-1 col-end-2 row-start-1 row-end-3 flex flex-col items-center">
                        <img src="/public/img/azazal.jpg">
                        <span class="pt-4 font-decoration text-[1.2rem] text-center">Im a cute cat</span>
                    </div>
                    <div class="col-start-2 col-end-3 row-start-2 row-end-4 flex flex-col items-center">
                        <img src="/public/img/azazal.jpg">
                        <span class="pt-4 font-decoration text-[1.2rem] text-center">Im a cute cat</span>
                    </div>
                    <div class="col-start-3 col-end-4 row-start-1 row-end-3 flex flex-col items-center">
                        <img src="/public/img/azazal.jpg">
                        <span class="pt-4 font-decoration text-[1.2rem] text-center">Im a cute cat</span>
                    </div>
                </div>

            </section>


            <!-- Section Planètes -->

            <section class="section-space overflow-hidden">
                <div class="animate-planet-translate flex w-max gap-9">
                    <img class="w-[17vw] h-auto aspect-square overflow-hidden object-cover" src="/public/img/planet1.png">
                    <img class="w-[17vw] h-auto aspect-square overflow-hidden object-cover" src="/public/img/planet2.png">
                    <img class="w-[17vw] h-auto aspect-square overflow-hidden object-cover" src="/public/img/sun.png">
                    <img class="w-[17vw] h-auto aspect-square overflow-hidden object-cover" src="/public/img/azazal.jpg">

                    <img class="w-[17vw] h-auto aspect-square overflow-hidden object-cover" src="/public/img/planet1.png">
                    <img class="w-[17vw] h-auto aspect-square overflow-hidden object-cover" src="/public/img/planet2.png">
                    <img class="w-[17vw] h-auto aspect-square overflow-hidden object-cover" src="/public/img/sun.png">
                    <img class="w-[17vw] h-auto aspect-square overflow-hidden object-cover" src="/public/img/azazal.jpg">
                </div>
            </section>

            <!-- Footer -->

            <footer class="flex justify-around items-center relative">
                <span class="font-decoration">
                    Les crédits
                </span>
                <div class="relative w-[40%] overflow-hidden">
                    <img class="absolute left-1/2 -translate-x-1/2 bottom-[-15%] w-[75%] z-10 hidden dark:block" src="/public/img/moon.png">
                    <img class="absolute left-1/2 -translate-x-1/2 bottom-[-15%] w-[75%] z-10 dark:hidden" src="/public/img/sun.png">
                    <img class="relative w-full" src="/public/img/hello_cat.png">
                </div>
                <span class="font-decoration">
                    Les crédits
                </span>
            </footer>


            <!-- Chats en background -->

            <div>
                <img class="absolute top-[25%] animate-cat1-translate z-0 w-[25%]" src="/public/img/space_KARMA.png">
            </div>

        </div>

        <!-- JS (dark mode) -->

        <script>

            const dark_mode = document.getElementById("dark_mode");
            console.log(dark_mode);

            dark_mode.addEventListener("click", () => {
                const html = document.querySelector("html");
                console.log(html.className)
                if(html.className != "") {
                    html.classList.remove("dark");
                }else {
                    html.classList.add("dark");
                }
            })

        </script>


    </body>
</html>
