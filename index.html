<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Space Cats</title>
        <link rel="icon" type="image/png" href="/public/img/logo.png" />
        <link href="/src/style.css" rel="stylesheet">  
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
        <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    </head>
    <body class="mx-auto bg-no-repeat bg-cover bg-[url(/public/img/background-light.jpg)] dark:bg-[url(/public/img/background.jpg)] font-sans">

        <div class="relative z-1 overflow-hidden">

            <!-- Header -->

            <header class="px-8 sm:px-6 lg:px-8 mt-6 flex justify-between items-center mb-60 lg:mb-40">
                <div class="sm:w-[20%] lg:w-[5%]">
                    <img class="w-full" src="public/img/logo.png" alt="logo chat">
                </div>

                <div class="w-[15%] lg:w-[5%]" id="dark_mode">
                    <img class="w-full hidden dark:block" src="public/img/lightmode.png" alt="logo_placeholder">
                    <img class="w-full dark:hidden" src="public/img/nightmode.png" alt="logo_placeholder">
                </div>
            </header>

            <!-- Section titre -->

            <section class="relative max-w-5xl mr-auto ml-auto mb-60 mt-20  px-8 sm:px-6 lg:px-8 ">
                <div class="relative w-fit">
                    <img class="absolute z-2 w-[20%] -top-[10%] rotate-15 left-[45%] animate-star-animation" src="/public/img/star.png">
                    <img class="absolute z-2 w-[20%] top-[33%] -rotate-25 left-[6%] animate-star-animation" src="/public/img/star.png">
                    <img class="absolute z-2 w-[20%] -bottom-[2%] rotate-40 right-[11%] animate-star-animation" src="/public/img/star.png">
                    <h1 class="font-decoration text-[clamp(11rem,25vw,18rem)] relative z-1 w-fit h-auto">SPACE CATS</h1>
                </div>
                <a href="#" class="button-decoration flex items-center ">Discover our felin space &nbsp <i class='bx bx-right-arrow-circle'></i></a>
            </section>


            <!-- Section UFO -->

            <section class="section-space mr-auto ml-auto mb-60 flex justify-center">

                <img class="w-full max-w-[30rem] lg:max-w-[24rem] aspect-4/5 object-cover" src="/public/img/anim.gif">

            </section>

            <!-- Section Cats-->
            
            <section class="mb-80 px-8 sm:px-6 lg:px-8">
                <h2 class="font-decoration text-[clamp(3rem,3vw,3.4rem)] w-full text-center mb-11">Discover our cats</h2>
                <div class="grid grid-cols-3 grid-rows-3 gap-7 mt-30">
                    <div class="col-start-1 col-end-2 row-start-1 row-end-3 flex flex-col items-center">
                        <img class="aspect-2/3 object-cover animate-float lg:w-[40%]" src="/public/img/chat1.jpg">
                        <span class="pt-4 font-decoration text-[1.2rem] text-center">Karma</span>
                    </div>
                    <div class="col-start-2 col-end-3 row-start-2 row-end-4 flex flex-col items-center">
                        <img class="aspect-2/3 object-cover animate-float lg:w-[40%]" src="/public/img/chat2.png">
                        <span class="pt-4 font-decoration text-[1.2rem] text-center">Félicette</span>
                    </div>
                    <div class="col-start-3 col-end-4 row-start-1 row-end-3 flex flex-col items-center">
                        <img class="aspect-2/3 object-cover animate-float lg:w-[40%]" src="/public/img/uwu.jpg">
                        <span class="pt-4 font-decoration text-[1.2rem] text-center">Angelo</span>
                    </div>
                </div>

            </section>


            <!-- Section Planètes -->

            <section class="mb-80 overflow-hidden relative z-10">
                <div class="animate-planet-translate flex w-max gap-9 ">
                    <img class="w-[30vw] lg:w-[15vw] h-auto aspect-square overflow-hidden object-cover" src="/public/img/planet1.png">
                    <img class="w-[30vw] lg:w-[15vw] h-auto aspect-square overflow-hidden object-cover" src="/public/img/planet2.png">
                    <img class="w-[30vw] lg:w-[15vw] h-auto aspect-square overflow-hidden object-cover" src="/public/img/sun.png">
                    <img class="w-[30vw] lg:w-[15vw] h-auto aspect-square overflow-hidden object-cover" src="/public/img/azazal.jpg">

                    <img class="w-[30vw] lg:w-[15vw] h-auto aspect-square overflow-hidden object-cover" src="/public/img/planet1.png">
                    <img class="w-[30vw] lg:w-[15vw] h-auto aspect-square overflow-hidden object-cover" src="/public/img/planet2.png">
                    <img class="w-[30vw] lg:w-[15vw] h-auto aspect-square overflow-hidden object-cover" src="/public/img/sun.png">
                    <img class="w-[30vw] lg:w-[15vw] h-auto aspect-square overflow-hidden object-cover" src="/public/img/azazal.jpg">

                    <img class="hidden lg-screen:block w-[30vw] lg:w-[15vw] h-auto aspect-square overflow-hidden object-cover" src="/public/img/planet1.png">
                    <img class="hidden lg-screen:block w-[30vw] lg:w-[15vw] h-auto aspect-square overflow-hidden object-cover" src="/public/img/planet2.png">
                    <img class="hidden lg-screen:block w-[30vw] lg:w-[15vw] h-auto aspect-square overflow-hidden object-cover" src="/public/img/sun.png">
                    <img class="hidden lg-screen:block w-[30vw] lg:w-[15vw] h-auto aspect-square overflow-hidden object-cover" src="/public/img/azazal.jpg">

                    <img class="hidden lg-screen:block w-[30vw] lg:w-[15vw] h-auto aspect-square overflow-hidden object-cover" src="/public/img/planet1.png">
                    <img class="hidden lg-screen:block w-[30vw] lg:w-[15vw] h-auto aspect-square overflow-hidden object-cover" src="/public/img/planet2.png">
                    <img class="hidden lg-screen:block w-[30vw] lg:w-[15vw] h-auto aspect-square overflow-hidden object-cover" src="/public/img/sun.png">
                    <img class="hidden lg-screen:block w-[30vw] lg:w-[15vw] h-auto aspect-square overflow-hidden object-cover" src="/public/img/azazal.jpg">
                </div>
            </section>

            <!-- Footer -->

            <footer class="flex justify-center items-center relative px-8 sm:px-6 lg:px-8">
                <div class="relative w-full max-w-[52rem] mx-auto overflow-hidden">
                    <img class="absolute left-1/2 -translate-x-1/2 bottom-[-15%] lg:bottom-[-55%] w-[75%] lg:w-[50%] z-10 hidden dark:block planet-rotate" src="/public/img/moon.png">
                    <img class="relative w-full max-w-[44rem] mx-auto mb-[-50%] animate-planet-rotate lg:max-w-[42rem]" src="/public/img/catsun.png">
                </div>
            </footer>


            <!-- Chats en background -->

            <div>
                <img class="absolute top-[20%] animate-cat1-translate z-0 w-[24%] lg:w-[14%]" src="/public/img/space_KARMA.png">
                <img class="absolute top-[50%] animate-cat2-translate z-0 w-[25%] lg:w-[14%]" src="/public/img/angelo.png">
                <img class="absolute top-[74%] animate-cat1-translate z-0 w-[24%] lg:w-[14%]" src="/public/img/space_KARMA.png">
                <img class="absolute top-[90%] animate-cat2-translate z-0 w-[25%] lg:w-[14%]" src="/public/img/angelo.png">
            </div>

        </div>

        <!-- JS (dark mode) -->

        <script>

            const dark_mode = document.getElementById("dark_mode");

            dark_mode.addEventListener("click", () => {
                const html = document.querySelector("html");
                console.log(html.className)
                if(html.className != "") {
                    html.classList.remove("dark");
                }else {
                    html.classList.add("dark");
                }
            })

        </script>


    </body>
</html>
